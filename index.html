<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f9f8" />
  <title>Ortiz Learning OS</title>
  <meta name="description" content="Chris Ortiz's personal AI-powered learning system." />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Ortiz OS" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <div class="app-topbar">
      <span class="wordmark">
        <svg class="wordmark-bulb" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a6 6 0 0 1 4 10.4c-.8.7-1 1.7-1 2.6H9c0-.9-.2-1.9-1-2.6A6 6 0 0 1 12 3z"/><path d="M9.5 19h5M10.5 21.5h3"/></svg>
        Ortiz&nbsp;Learning&nbsp;OS
      </span>
      <span id="header-sync" class="header-sync" title="Sync status"></span>
    </div>

    <main id="view" class="view"></main>

    <nav class="tabbar">
      <a class="tab" data-tab="dashboard" href="#/dashboard">
        <span class="tab-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.5 11 12 3.5 20.5 11"/><path d="M5.5 9.5V20h13V9.5"/><path d="M10 20v-5h4v5"/></svg></span><span class="tab-label">Home</span>
      </a>
      <a class="tab" data-tab="topics" href="#/topics">
        <span class="tab-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h11a3 3 0 0 1 3 3v13H8a3 3 0 0 1-3-3V4z"/><path d="M19 16H8a3 3 0 0 0-3 3"/><path d="M9 8h6"/></svg></span><span class="tab-label">Topics</span>
      </a>
      <a class="tab" data-tab="review" href="#/review">
        <span class="tab-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.3-5.6"/><path d="M20 4v4h-4"/></svg></span><span class="tab-label">Review</span>
      </a>
      <a class="tab" data-tab="coach" href="#/coach">
        <span class="tab-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a6 6 0 0 1 4 10.4c-.8.7-1 1.7-1 2.6H9c0-.9-.2-1.9-1-2.6A6 6 0 0 1 12 3z"/><path d="M9.5 19h5M10.5 21.5h3"/></svg></span><span class="tab-label">Coach</span>
      </a>
      <a class="tab" data-tab="settings" href="#/settings">
        <span class="tab-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h9M17 7h3M4 17h3M11 17h9"/><circle cx="15" cy="7" r="2.2"/><circle cx="9" cy="17" r="2.2"/></svg></span><span class="tab-label">Settings</span>
      </a>
    </nav>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
